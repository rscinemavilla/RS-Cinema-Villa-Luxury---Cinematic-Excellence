<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RS Cinema Villa – Private Villa Stay Near Hyderabad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="RS Cinema Villa is a private holiday villa near Moinabad/Chevella on the outskirts of Hyderabad, Telangana, ideal for families, friends, and small groups seeking a peaceful stay with a pool and cinema-style ambiance."
  />
  <style>
    :root {
      --bg-dark: #050814;
      --bg-section: #0b1020;
      --accent: #c9a44a;
      --accent-soft: rgba(201, 164, 74, 0.15);
      --text-main: #f7f7f7;
      --text-muted: #b0b5c7;
      --card-bg: #111628;
      --border-soft: #262b3e;
      --error: #ff6b6b;
      --max-width: 1120px;
      --radius: 14px;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #141b33 0, #050814 50%, #02030a 100%);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Layout helpers */
    .container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 16px;
    }

    section {
      padding: 72px 0;
      scroll-margin-top: 80px;
    }

    h1, h2, h3 {
      letter-spacing: 0.02em;
    }

    h2.section-title {
      font-size: 1.9rem;
      margin-bottom: 12px;
    }

    p.section-intro {
      color: var(--text-muted);
      max-width: 640px;
      font-size: 0.96rem;
    }

    /* Navigation */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: linear-gradient(to bottom, rgba(5, 8, 20, 0.96), rgba(5, 8, 20, 0.82));
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.86rem;
    }

    .nav-logo-mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      background: radial-gradient(circle at 30% 10%, #2a2f48 0, #050814 70%);
      box-shadow: 0 0 18px rgba(201, 164, 74, 0.45);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 0.9rem;
    }

    .nav-links a {
      padding: 6px 0;
      position: relative;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #f4e2b4);
      transition: width 0.25s ease-out;
    }

    .nav-links a:hover {
      color: var(--text-main);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* Hero */
    .hero {
      padding: 40px 0 72px;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
      gap: 32px;
      align-items: center;
    }

    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(7, 11, 30, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 16px;
    }

    .hero-label-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffe9b0 0, var(--accent) 50%, #9a742c 100%);
      box-shadow: 0 0 10px rgba(201, 164, 74, 0.8);
    }

    .hero-title {
      font-size: clamp(2.2rem, 3.2vw, 2.9rem);
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .hero-title span {
      color: var(--accent);
    }

    .hero-subtitle {
      color: var(--text-muted);
      font-size: 0.98rem;
      max-width: 520px;
      margin-bottom: 24px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(19, 25, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }

    .btn-primary,
    .btn-outline {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, background 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f3e2b7, var(--accent));
      color: #201804;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.75);
    }

    .btn-outline {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.22);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-1px);
    }

    .hero-note {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .hero-note span {
      color: var(--accent);
    }

    .hero-media {
      position: relative;
    }

    .hero-card {
      position: relative;
      border-radius: 24px;
      background: radial-gradient(circle at top, #262f52 0, #070a18 50%, #02030a 100%);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.85)),
        radial-gradient(circle at top left, rgba(72, 94, 168, 0.9) 0, transparent 55%),
        radial-gradient(circle at bottom right, rgba(201, 164, 74, 0.6) 0, transparent 60%),
        url("https://images.pexels.com/photos/261102/pexels-photo-261102.jpeg?auto=compress&cs=tinysrgb&w=1600");
      background-size: cover;
      background-position: center;
      filter: saturate(1.05);
      transform: scale(1.03);
    }

    .hero-overlay {
      position: relative;
      padding: 20px 20px 18px;
      backdrop-filter: blur(6px);
      background: linear-gradient(to top, rgba(5, 8, 20, 0.95), rgba(5, 8, 20, 0.1));
    }

    .hero-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .hero-pill {
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(10, 15, 35, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .hero-card-title {
      font-size: 1.02rem;
      margin-bottom: 4px;
    }

    .hero-card-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .hero-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
    }

    .hero-tag {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(201, 164, 74, 0.2);
      border: 1px solid rgba(201, 164, 74, 0.6);
      color: #f9ecc6;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.7rem;
    }

    .hero-badge {
      position: absolute;
      top: 14px;
      right: 16px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(9, 13, 30, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hero-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #46f0a3;
      box-shadow: 0 0 12px rgba(70, 240, 163, 0.9);
    }

    /* Cards & grids */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border-soft);
      padding: 18px 18px 16px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      background: rgba(9, 13, 28, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 14px;
    }

    .badge span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(to bottom, var(--accent), #8b6a1f);
    }

    ul {
      list-style: none;
      margin-top: 8px;
    }

    ul li {
      position: relative;
      padding-left: 18px;
      margin-bottom: 6px;
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    ul li::before {
      content: "•";
      position: absolute;
      left: 3px;
      top: 0;
      color: var(--accent);
    }

    /* Amenities */
    .amenity-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .amenity-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .amenity-title {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .amenity-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .amenities-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.08);
      padding-top: 8px;
    }

    /* Gallery */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 22px;
    }

    .gallery-item {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #15192d;
      cursor: pointer;
      aspect-ratio: 4 / 3;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.03);
      transition: transform 0.25s ease-out, opacity 0.25s ease-out;
      opacity: 0.88;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
      opacity: 1;
    }

    .gallery-item::after {
      content: "View";
      position: absolute;
      left: 10px;
      bottom: 8px;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* Simple lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.8);
    }

    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 1.6rem;
      cursor: pointer;
      color: #fff;
    }

    /* Location */
    .location-map {
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: radial-gradient(circle at top, #1d2441 0, #050814 70%);
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.86rem;
      margin-top: 16px;
    }

    .location-map span {
      opacity: 0.9;
    }

    .nearby-list li {
      margin-bottom: 4px;
    }

    /* Booking & form */
    .booking-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(0, 1fr);
      gap: 20px;
      margin-top: 24px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
      margin-top: 10px;
    }

    .form-full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 0.78rem;
      margin-bottom: 4px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    input,
    textarea {
      width: 100%;
      padding: 8px 9px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(9, 12, 26, 0.9);
      color: var(--text-main);
      font-size: 0.86rem;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(201, 164, 74, 0.4);
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .contact-note,
    .platform-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    .platform-note {
      border-top: 1px dashed rgba(255, 255, 255, 0.08);
      padding-top: 8px;
    }

    .contact-pill {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(7, 10, 23, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .contact-label {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* FAQ */
    .faq {
      margin-top: 20px;
    }

    .faq-item {
      border-radius: 12px;
      background: rgba(8, 12, 29, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 8px;
      overflow: hidden;
    }

    .faq-header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .faq-header span {
      font-weight: 500;
    }

    .faq-toggle {
      font-size: 1rem;
      color: var(--accent);
      transition: transform 0.2s ease-out;
    }

    .faq-body {
      padding: 0 12px 10px;
      font-size: 0.86rem;
      color: var(--text-muted);
      display: none;
    }

    .faq-item.open .faq-body {
      display: block;
    }

    .faq-item.open .faq-toggle {
      transform: rotate(90deg);
    }

    /* Footer */
    footer {
      padding: 22px 0 26px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    footer .foot {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: minmax(0, 1fr);
      }
      .hero-media {
        order: -1;
      }
      .gallery-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .booking-layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (max-width: 720px) {
      .nav-links {
        display: none;
      }
      section {
        padding: 56px 0;
      }
      .hero {
        padding-top: 28px;
      }
      .grid {
        grid-template-columns: minmax(0, 1fr);
      }
      .grid-2 {
        grid-template-columns: minmax(0, 1fr);
      }
      .gallery-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      form {
        grid-template-columns: minmax(0, 1fr);
      }
      .hero-card {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <header>
    <div class="container">
      <nav class="nav">
        <div class="nav-logo">
          <div class="nav-logo-mark">RS</div>
          <div>
            <div style="font-size:0.78rem;">RS CINEMA VILLA</div>
            <div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.16em;">
              Moinabad • Telangana
            </div>
          </div>
        </div>
        <div class="nav-links">
          <a href="#home">Home</a>
          <a href="#about">About</a>
          <a href="#amenities">Amenities</a>
          <a href="#gallery">Gallery</a>
          <a href="#location">Location</a>
          <a href="#booking">Booking</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <main id="home" class="hero">
    <div class="container">
      <div class="hero-inner">
        <div>
          <div class="hero-label">
            <div class="hero-label-dot"></div>
            Private villa stay • Hyderabad
          </div>
          <h1 class="hero-title">
            RS Cinema Villa – Your Private Getaway <span>Near Hyderabad</span>
          </h1>
          <p class="hero-subtitle">
            Spacious villa stay near Moinabad/Chevella with a pool, outdoor spaces, and a cinema‑style vibe
            designed for families, friends, and small groups who want to stay together in comfort and privacy.
          </p>
          <div class="hero-meta">
            <div class="hero-meta-item">Moinabad/Chevella, Telangana</div>
            <div class="hero-meta-item">Ideal for weekend trips &amp; staycations</div>
          </div>
          <div class="hero-buttons">
            <!-- Replace # with your tel: link -->
            <a href="#" class="btn-primary">Call to Book</a>
            <!-- Replace # with your WhatsApp link -->
            <a href="#" class="btn-outline">WhatsApp Us</a>
          </div>
          <p class="hero-note">
            Add your <span>phone number</span> and WhatsApp click‑to‑chat link to the buttons above when you are ready.
          </p>
        </div>
        <div class="hero-media">
          <div class="hero-card">
            <div class="hero-bg"></div>
            <div class="hero-badge">
              <span class="hero-badge-dot"></span>
              Availability on request
            </div>
            <div class="hero-overlay">
              <div class="hero-pill-row">
                <div class="hero-pill">Private villa</div>
                <div class="hero-pill">Pool • Outdoor spaces</div>
                <div class="hero-pill">Group‑friendly</div>
              </div>
              <div class="hero-card-title">Cinematic villa escape</div>
              <div class="hero-card-sub">
                Gather your group under one roof, relax by the pool, and enjoy movie nights in a cozy, private setting.
              </div>
              <div class="hero-card-meta">
                <div style="font-size:0.8rem;color:var(--text-muted);">
                  Near Hyderabad • Easy drive from city
                </div>
                <div class="hero-tag">Moinabad/Chevella belt</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- About -->
  <section id="about">
    <div class="container">
      <div class="card">
        <div class="badge"><span></span> About the villa</div>
        <h2 class="section-title">A private farm‑stay style villa</h2>
        <p class="section-intro">
          RS Cinema Villa is a standalone holiday home on the outskirts of Hyderabad, set in the Moinabad/Chevella
          area, with multiple bedrooms, a large living room, a basic kitchen setup, and open spaces that work well
          for group stays and family trips.[web:7][web:9][web:14]
        </p>
        <p class="section-intro" style="margin-top:8px;">
          It is suitable for weekend getaways, birthdays, small celebrations, casual get‑togethers, and longer
          staycations when you want to step out of the city but still remain within driving distance.[web:7][web:19]
        </p>

        <ul style="margin-top:16px;">
          <li>Feels like your own private villa, with no hotel corridors or shared lobbies.</li>
          <li>Cinematic ambiance with cozy evening lighting and spaces where your group can watch movies together.</li>
          <li>Convenient access from Hyderabad while still offering a peaceful, green setting.</li>
        </ul>
      </div>
    </div>
  </section>

  <!-- Amenities -->
  <section id="amenities">
    <div class="container">
      <div class="card">
        <div class="badge"><span></span> Amenities</div>
